name: Sync Spotify Playlists

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 */3 * *"

permissions:
  contents: write

concurrency:
  group: spotify-playlist-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync playlists from Spotify
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: python scripts/sync_spotify_playlists.py

      - name: Validate synced playlist JSON
        run: python -c "import json, pathlib; json.loads(pathlib.Path('public/data/spotify-playlists.json').read_text(encoding='utf-8'))"

      - name: Detect playlist file changes
        id: playlist_diff
        run: |
          if git diff --quiet -- public/data/spotify-playlists.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pushes using GITHUB_TOKEN do not trigger other workflows, so "Deploy to Neocities"
      # on push would never run after this commit. Deploy here when JSON updates.
      - name: Refresh Neocities visitor stats JSON
        if: steps.playlist_diff.outputs.changed == 'true'
        env:
          NEOCITIES_SITENAME: tobiasaei
        run: python scripts/fetch_neocities_site_stats.py

      - name: Deploy to Neocities
        if: steps.playlist_diff.outputs.changed == 'true'
        uses: bcomnes/deploy-to-neocities@v3
        with:
          api_key: ${{ secrets.NEOCITIES_API_TOKEN }}
          cleanup: true
          dist_dir: public

      - name: Commit playlist updates
        run: |
          if git diff --quiet -- public/data/spotify-playlists.json; then
            echo "No playlist changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/spotify-playlists.json
          git commit -m "chore: sync spotify playlists"
          git push
