<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Tobias AEI — personal site. Enter the lab." />
    <title>Tobias_AEI: Start</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: oklch(97% 0.01 190);
        --teal-900: oklch(22% 0.06 200);
        --teal-700: oklch(42% 0.11 195);
        --teal-500: oklch(58% 0.13 185);
        --teal-300: oklch(82% 0.08 175);
        --accent: oklch(75% 0.16 45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(145deg, oklch(10% 0.03 220 / 0.7), oklch(18% 0.04 190 / 0.55)),
          url("backiee-169091.jpg") center / cover no-repeat fixed;
        overflow: hidden;
      }

      .entry {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        isolation: isolate;
      }

      .entry::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 14% 16%, oklch(56% 0.14 188 / 0.45), transparent 42%),
          radial-gradient(circle at 84% 82%, oklch(66% 0.13 170 / 0.35), transparent 38%);
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: -1;
      }

      .entry::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 2px,
          oklch(0% 0 0 / 0.22) 2px,
          oklch(0% 0 0 / 0.22) 3px
        );
        mix-blend-mode: soft-light;
        pointer-events: none;
        z-index: -1;
        animation: scan 8s linear infinite;
      }

      .entry-card {
        max-width: 48rem;
        width: min(100%, 48rem);
        padding: 2rem;
        border: 1px solid oklch(80% 0.1 180 / 0.35);
        border-radius: 1.2rem;
        background: oklch(17% 0.05 205 / 0.55);
        backdrop-filter: blur(8px);
        box-shadow: 0 18px 64px oklch(0% 0 0 / 0.35);
      }

      .entry-label {
        margin: 0 0 0.85rem 0;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--teal-300);
      }

      .entry h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
      }

      .entry p {
        margin: 1rem 0 1.8rem;
        max-width: 44ch;
        color: oklch(90% 0.03 195);
      }

      .enter-link {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-weight: 700;
        color: var(--ink);
        text-decoration: none;
        border: 1px solid oklch(84% 0.07 170 / 0.45);
        border-radius: 999px;
        padding: 0.75rem 1rem;
        background: linear-gradient(135deg, oklch(60% 0.13 182 / 0.75), oklch(70% 0.1 170 / 0.62));
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .enter-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px oklch(0% 0 0 / 0.28);
      }

      .enter-link:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .entry-burst {
        position: absolute;
        right: 6%;
        top: 14%;
        width: 11rem;
        height: 11rem;
        border-radius: 50%;
        border: 1px solid oklch(86% 0.12 175 / 0.45);
        box-shadow: inset 0 0 0 1rem oklch(44% 0.11 185 / 0.2);
        filter: blur(0.2px);
      }

      @keyframes scan {
        0% { transform: translateY(0); }
        100% { transform: translateY(100%); }
      }

      @media (max-width: 680px) {
        .entry-card { padding: 1.35rem; }
        .entry-burst { width: 7rem; height: 7rem; right: 4%; }
      }

      @media (prefers-reduced-motion: reduce) {
        .entry::after { animation: none; }
        .enter-link { transition: none; }
      }
    </style>
  </head>
  <body>
    <main class="entry">
      <div class="entry-burst" aria-hidden="true"></div>
      <section class="entry-card">
        <p class="entry-label">Personal website</p>
        <h1>Tobias AEI</h1>
        <p>Home of a failing bard.</p>
        <a class="enter-link" href="home.html" aria-label="Enter site">
          Enter lab
          <span aria-hidden="true">→</span>
        </a>
      </section>
    </main>
  </body>
</html>
