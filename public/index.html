<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Tobias AEI — personal site. Enter the lab." />
    <title>Tobias_AEI: Start</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #080f10;
        --teal-primary: #2dd4bf;
        --teal-muted: #14b8a6;
        --text-primary: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Cormorant Garamond", serif;
        color: var(--text-primary);
        background:
          linear-gradient(rgba(8, 15, 16, 0.72), rgba(8, 15, 16, 0.72)),
          url("backiee-169091.jpg") center / cover no-repeat fixed;
        overflow: hidden;
      }

      .vhs-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 20;
      }

      .vhs-scanlines {
        position: absolute;
        inset: 0;
        opacity: 0.55;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.1) 50%,
          rgba(0, 0, 0, 0.1)
        );
        background-size: 100% 4px;
        animation: scanMove 8s linear infinite;
      }

      .vhs-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 50%, rgba(8, 15, 16, 0.82) 100%);
      }

      .vhs-flicker {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.08);
        mix-blend-mode: overlay;
        animation: flicker 1.8s infinite;
      }

      .entry {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        isolation: isolate;
        z-index: 30;
      }

      .entry::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(60vw, 600px);
        height: min(60vw, 600px);
        border-radius: 50%;
        background: rgba(45, 212, 191, 0.08);
        filter: blur(80px);
      }

      .entry h1 {
        margin: 0;
        font-size: clamp(3rem, 11vw, 6.4rem);
        line-height: 1;
        letter-spacing: 0.2em;
      }

      .glitch-text {
        position: relative;
        letter-spacing: 0.08em;
      }

      .glitch-text::before,
      .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        inset: 0;
        opacity: 0.7;
        pointer-events: none;
      }

      .glitch-text::before {
        transform: translateX(1px);
        color: oklch(78% 0.12 195 / 0.5);
      }

      .glitch-text::after {
        transform: translateX(-1px);
        color: oklch(74% 0.11 38 / 0.5);
      }

      .type-line {
        margin: 1.2rem 0 2.5rem;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.9rem;
        letter-spacing: 0.14em;
        color: var(--teal-muted);
        min-height: 1.4rem;
      }

      .cursor {
        display: inline-block;
        width: 9px;
        height: 1.1rem;
        margin-left: 0.35rem;
        vertical-align: middle;
        background: var(--teal-primary);
        animation: blink 1s step-end infinite;
      }

      .enter-link {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-family: "IBM Plex Mono", monospace;
        font-weight: 500;
        font-size: 0.72rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--teal-primary);
        text-decoration: none;
        border: 1px solid rgba(45, 212, 191, 0.35);
        border-radius: 2px;
        padding: 0.75rem 1rem;
        background: rgba(45, 212, 191, 0.05);
        box-shadow: 0 0 0 rgba(45, 212, 191, 0);
        opacity: 1;
        pointer-events: auto;
        transition: opacity 0.45s ease, background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
      }

      .enter-link.is-ready {
        opacity: 1;
        pointer-events: auto;
      }

      .enter-link:hover {
        background: rgba(45, 212, 191, 0.11);
        border-color: rgba(45, 212, 191, 0.9);
        box-shadow: 0 0 16px rgba(45, 212, 191, 0.36);
      }

      .enter-link:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      @keyframes flicker {
        0%, 100% { opacity: 0.08; }
        40% { opacity: 0.04; }
        60% { opacity: 0.12; }
      }

      @keyframes scanMove {
        0% { transform: translateY(0); }
        100% { transform: translateY(8px); }
      }

      @keyframes blink {
        50% { opacity: 0; }
      }

      @media (max-width: 680px) {
        .entry h1 {
          font-size: clamp(2.3rem, 12vw, 4.1rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .vhs-flicker,
        .vhs-scanlines { animation: none; }
        .cursor { animation: none; }
        .enter-link { transition: none; }
      }
    </style>
  </head>
  <body>
    <div class="vhs-overlay" aria-hidden="true">
      <div class="vhs-scanlines"></div>
      <div class="vhs-vignette"></div>
      <div class="vhs-flicker"></div>
    </div>

    <main class="entry">
      <section>
        <h1 class="glitch-text" data-text="TOBIAS AEI">TOBIAS AEI</h1>
        <p class="type-line"><span id="typed-line"></span><span class="cursor" aria-hidden="true"></span></p>
        <a class="enter-link" id="enter-link" href="home.html" aria-label="Enter site">
          [ Initialize Sequence ]
        </a>
      </section>
    </main>
    <script>
      (function () {
        var fullText = "Home of a failing bard...";
        var typed = document.getElementById("typed-line");
        var enter = document.getElementById("enter-link");
        if (!typed || !enter) return;
        enter.addEventListener("click", function () {
          window.location.href = "home.html";
        });
        var i = 0;
        var timer = setInterval(function () {
          i += 1;
          typed.textContent = fullText.slice(0, i);
          if (i >= fullText.length) {
            clearInterval(timer);
            setTimeout(function () {
              enter.classList.add("is-ready");
            }, 800);
          }
        }, 95);
      })();
    </script>
  </body>
</html>
