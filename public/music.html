<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Music — Tobias AEI" />
    <title>Tobias_AEI: Music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="headerPlaceholder"></div>
      <div class="music-layout">
        <main class="music-main">
          <header class="page-head">
            <h1>Music Landscapes</h1>
            <p>The sounds that keep me alive.</p>
          </header>

          <section class="music-hero" aria-label="Last played on Last.fm">
            <div class="music-hero-label">Now Playing</div>
            <div id="last-played-content">
              <p class="music-loading">Loading…</p>
            </div>
          </section>

          <section class="music-recs" aria-label="Top tracks">
            <h2 class="music-recs-title">Top Weekly Tracks</h2>
            <ul id="weekly-top-tracks" class="music-track-list music-track-grid">
              <li class="music-track-tile"><span class="music-track-name">Loading weekly tracks…</span><span class="music-track-artist">Last.fm</span></li>
            </ul>
          </section>

          <section class="music-curated" aria-label="Curated Playlists">
            <h2 class="music-recs-title">Curated Playlists</h2>
            <div class="music-curated-controls">
              <span id="spotify-curated-status" class="music-curated-status">Loading playlists…</span>
            </div>
            <div id="curated-playlists">
              <article class="curated-item">
                <h3>Loading curated playlists…</h3>
                <p>Building picks from your listening profile.</p>
              </article>
            </div>
          </section>
        </main>
      </div>
      <div id="footerPlaceholder"></div>
    </div>
    <script src="main.js"></script>
    <script src="spotify-config.js"></script>
    <script>
      (function () {
        var container = document.getElementById("last-played-content");
        var weeklyContainer = document.getElementById("weekly-top-tracks");
        var curatedContainer = document.getElementById("curated-playlists");
        var curatedStatus = document.getElementById("spotify-curated-status");
        if (!container) return;
        var LASTFM_API_KEY = "d74f9fdb9c79a50ffac2ca0700892ca1";
        var LASTFM_USER = "Tobias_AEI";
        var SPOTIFY_CLIENT_ID = (window.TAE_SPOTIFY_CLIENT_ID || "").trim();
        var SPOTIFY_REDIRECT_URI = (window.TAE_SPOTIFY_REDIRECT_URI || (window.location.origin + window.location.pathname)).trim();
        var SPOTIFY_SCOPES = "playlist-read-private playlist-read-collaborative";
        var SPOTIFY_TOKEN_KEY = "taeSpotifyTokenV1";
        var SPOTIFY_VERIFIER_KEY = "taeSpotifyCodeVerifierV1";
        var SPOTIFY_STATE_KEY = "taeSpotifyStateV1";
        var SPOTIFY_AUTO_AUTH_KEY = "taeSpotifyAutoAuthAttemptedV1";

        fetchRecentTrack()
          .then(function (t) {
            if (!t || !t.name) {
              container.innerHTML = "<p class=\"music-loading\">No recent track.</p>";
              return;
            }
            var artist = t.artist && t.artist["#text"] ? t.artist["#text"] : "";
            var img = getTrackImage(t.image);
            var url = safeUrl(t.url);
            var isNowPlaying = !!(t["@attr"] && t["@attr"].nowplaying === "true");
            var status = isNowPlaying
              ? "Scrobbling now"
              : (t.date && t.date["#text"] ? t.date["#text"] : "Recently played");
            var html = "<div class=\"music-now-card\">";
            if (img) html += "<a href=\"" + url + "\" target=\"_blank\" rel=\"noopener\"><img src=\"" + img + "\" alt=\"\" width=\"120\" height=\"120\" class=\"music-now-art\"></a>";
            html += "<div class=\"music-now-info\"><a href=\"" + url + "\" target=\"_blank\" rel=\"noopener\" class=\"music-now-track\">" + escapeHtml(t.name) + "</a>";
            if (artist) html += "<span class=\"music-now-artist\">" + escapeHtml(artist) + "</span>";
            html += "<span class=\"music-now-status\">" + escapeHtml(status) + "</span>";
            html += "</div></div>";
            container.innerHTML = html;
          })
          .catch(function () {
            container.innerHTML = "<p class=\"music-loading\">Couldn’t load last played.</p>";
          });
        fetchWeeklyTopTracks()
          .then(renderWeeklyTracks)
          .catch(function () {
            if (!weeklyContainer) return;
            weeklyContainer.innerHTML = "<li class=\"music-track-tile\"><span class=\"music-track-name\">Couldn’t load weekly tracks.</span><span class=\"music-track-artist\">Try again later</span></li>";
          });
        initCuratedPlaylists();

        function fetchRecentTrack() {
          var endpoint =
            "https://ws.audioscrobbler.com/2.0/?" +
            "method=user.getrecenttracks" +
            "&user=" +
            encodeURIComponent(LASTFM_USER) +
            "&api_key=" +
            encodeURIComponent(LASTFM_API_KEY) +
            "&limit=1&format=json";
          return jsonp(endpoint).then(function (data) {
            if (!data || !data.recenttracks || !data.recenttracks.track || !data.recenttracks.track[0]) {
              throw new Error("No recent tracks");
            }
            return data.recenttracks.track[0];
          });
        }

        function fetchWeeklyTopTracks() {
          var endpoint =
            "https://ws.audioscrobbler.com/2.0/?" +
            "method=user.gettoptracks" +
            "&user=" +
            encodeURIComponent(LASTFM_USER) +
            "&api_key=" +
            encodeURIComponent(LASTFM_API_KEY) +
            "&period=7day&limit=8&format=json";
          return jsonp(endpoint).then(function (data) {
            if (!data || !data.toptracks || !data.toptracks.track || !data.toptracks.track.length) {
              throw new Error("No weekly tracks");
            }
            return data.toptracks.track;
          });
        }

        function renderWeeklyTracks(tracks) {
          if (!weeklyContainer) return;
          var html = "";
          for (var i = 0; i < tracks.length; i++) {
            var track = tracks[i];
            if (!track || !track.name) continue;
            var artist = track.artist && track.artist.name ? track.artist.name : "Unknown artist";
            var plays = track.playcount ? " · " + track.playcount + " plays" : "";
            html += "<li class=\"music-track-tile\">";
            html += "<span class=\"music-track-name\">" + escapeHtml(track.name) + "</span>";
            html += "<span class=\"music-track-artist\">" + escapeHtml(artist + plays) + "</span>";
            html += "</li>";
          }
          weeklyContainer.innerHTML = html || "<li class=\"music-track-tile\"><span class=\"music-track-name\">No weekly tracks yet.</span><span class=\"music-track-artist\">Last.fm</span></li>";
        }

        function renderCuratedPlaylists(playlists) {
          if (!curatedContainer) return;
          if (!playlists || !playlists.length) {
            curatedContainer.innerHTML =
              "<article class=\"curated-item\"><h3>No eligible playlists found</h3><p>Only playlists from your library and not made by Spotify are shown.</p></article>";
            return;
          }
          var picks = getRotatingPlaylists(playlists);
          var html = "";
          for (var i = 0; i < picks.length; i++) {
            html += "<article class=\"curated-item\">";
            html += "<h3><a href=\"" + escapeHtml(picks[i].url) + "\" target=\"_blank\" rel=\"noopener\">" + escapeHtml(picks[i].name) + "</a></h3>";
            if (picks[i].description) {
              html += "<p>" + escapeHtml(picks[i].description) + "</p>";
            }
            html += "</article>";
          }
          curatedContainer.innerHTML = html;
        }

        function getRotatingPlaylists(pool) {
          var cycle = Math.floor(Date.now() / (3 * 24 * 60 * 60 * 1000));
          var seeded = pool.slice();
          var seedInput = "cycle:" + cycle + "|count:" + pool.length;
          for (var i = 0; i < pool.length; i++) {
            seedInput += "|" + String(pool[i].url || pool[i].name || i);
          }
          var rng = createSeededRng(hashString(seedInput));
          for (var j = seeded.length - 1; j > 0; j--) {
            var k = Math.floor(rng() * (j + 1));
            var tmp = seeded[j];
            seeded[j] = seeded[k];
            seeded[k] = tmp;
          }
          return seeded.slice(0, Math.min(3, seeded.length));
        }

        function hashString(input) {
          var h = 2166136261;
          for (var i = 0; i < input.length; i++) {
            h ^= input.charCodeAt(i);
            h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
          }
          return h >>> 0;
        }

        function createSeededRng(seed) {
          var x = seed >>> 0;
          return function () {
            x += 0x6d2b79f5;
            var t = x;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }

        function setCuratedStatus(text) {
          if (!curatedStatus) return;
          curatedStatus.textContent = text;
        }

        function initCuratedPlaylists() {
          if (!SPOTIFY_CLIENT_ID) {
            setCuratedStatus("Spotify not connected. Using local playlist file.");
            loadLocalCuratedFallback();
            return;
          }

          getValidSpotifyToken()
            .then(function (token) {
              if (!token) {
                autoStartSpotifyAuth();
                return;
              }
              setCuratedStatus("Loading playlists from your Spotify library…");
              return fetchSpotifyLibraryPlaylists(token).then(function (playlists) {
                renderCuratedPlaylists(playlists);
                setCuratedStatus("Showing non-Spotify playlists from your library.");
              });
            })
            .catch(function () {
              setCuratedStatus("Spotify fetch failed. Using local fallback.");
              loadLocalCuratedFallback();
            });
        }

        function autoStartSpotifyAuth() {
          var alreadyAttempted = sessionStorage.getItem(SPOTIFY_AUTO_AUTH_KEY) === "1";
          if (alreadyAttempted) {
            setCuratedStatus("Spotify authorization was skipped or blocked. Using local fallback.");
            loadLocalCuratedFallback();
            return;
          }
          sessionStorage.setItem(SPOTIFY_AUTO_AUTH_KEY, "1");
          setCuratedStatus("Redirecting to Spotify authorization…");
          startSpotifyAuth().catch(function () {
            setCuratedStatus("Could not start Spotify auth. Using local fallback.");
            loadLocalCuratedFallback();
          });
        }

        function loadLocalCuratedFallback() {
          fetch("data/spotify-playlists.json", { cache: "no-store" })
            .then(function (res) {
              if (!res.ok) throw new Error("Playlist index unavailable");
              return res.json();
            })
            .then(function (all) {
              if (!Array.isArray(all)) all = [];
              var filtered = [];
              for (var i = 0; i < all.length; i++) {
                var p = all[i] || {};
                var ownerName = String(p.ownerName || "").trim();
                var inLibrary = !!p.inLibrary;
                if (!inLibrary) continue;
                if (ownerName.toLowerCase().indexOf("spotify") !== -1) continue;
                if (!p.name || !p.url) continue;
                filtered.push({
                  name: p.name,
                  url: p.url,
                  description: sanitizeSpotifyDescription(p.description || "")
                });
              }
              renderCuratedPlaylists(filtered);
            })
            .catch(function () {
              renderCuratedPlaylists([]);
            });
        }

        function readStoredSpotifyToken() {
          try {
            var raw = localStorage.getItem(SPOTIFY_TOKEN_KEY);
            if (!raw) return null;
            var parsed = JSON.parse(raw);
            if (!parsed || !parsed.access_token || !parsed.expires_at) return null;
            return parsed;
          } catch (e) {
            return null;
          }
        }

        function storeSpotifyToken(payload) {
          var now = Date.now();
          var expiresInSec = Number(payload.expires_in || 0);
          var token = {
            access_token: payload.access_token,
            expires_at: now + Math.max(0, expiresInSec - 60) * 1000
          };
          localStorage.setItem(SPOTIFY_TOKEN_KEY, JSON.stringify(token));
          return token;
        }

        function clearSpotifyToken() {
          localStorage.removeItem(SPOTIFY_TOKEN_KEY);
        }

        function getValidSpotifyToken() {
          var stored = readStoredSpotifyToken();
          if (stored && Date.now() < stored.expires_at) {
            return Promise.resolve(stored.access_token);
          }
          return maybeHandleSpotifyCallback().then(function (callbackToken) {
            if (callbackToken) return callbackToken;
            var latest = readStoredSpotifyToken();
            if (latest && Date.now() < latest.expires_at) return latest.access_token;
            return null;
          });
        }

        function randomString(len) {
          var chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
          var out = "";
          for (var i = 0; i < len; i++) out += chars.charAt(Math.floor(Math.random() * chars.length));
          return out;
        }

        function base64UrlEncode(bytes) {
          var str = "";
          for (var i = 0; i < bytes.length; i++) str += String.fromCharCode(bytes[i]);
          return btoa(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
        }

        function createCodeChallenge(verifier) {
          if (!window.crypto || !window.crypto.subtle) return Promise.reject(new Error("Crypto unavailable"));
          var data = new TextEncoder().encode(verifier);
          return window.crypto.subtle.digest("SHA-256", data).then(function (hash) {
            return base64UrlEncode(new Uint8Array(hash));
          });
        }

        function startSpotifyAuth() {
          if (!SPOTIFY_CLIENT_ID) return Promise.reject(new Error("Missing client id"));
          var verifier = randomString(96);
          var state = randomString(32);
          sessionStorage.setItem(SPOTIFY_VERIFIER_KEY, verifier);
          sessionStorage.setItem(SPOTIFY_STATE_KEY, state);
          return createCodeChallenge(verifier).then(function (challenge) {
            var params = new URLSearchParams({
              response_type: "code",
              client_id: SPOTIFY_CLIENT_ID,
              scope: SPOTIFY_SCOPES,
              redirect_uri: SPOTIFY_REDIRECT_URI,
              state: state,
              code_challenge_method: "S256",
              code_challenge: challenge
            });
            window.location.href = "https://accounts.spotify.com/authorize?" + params.toString();
          });
        }

        function maybeHandleSpotifyCallback() {
          var params = new URLSearchParams(window.location.search);
          var code = params.get("code");
          var state = params.get("state");
          if (!code) return Promise.resolve(null);
          var expectedState = sessionStorage.getItem(SPOTIFY_STATE_KEY);
          var verifier = sessionStorage.getItem(SPOTIFY_VERIFIER_KEY);
          if (!state || !expectedState || state !== expectedState || !verifier) {
            return Promise.reject(new Error("Invalid Spotify callback state"));
          }
          var body = new URLSearchParams({
            grant_type: "authorization_code",
            code: code,
            redirect_uri: SPOTIFY_REDIRECT_URI,
            client_id: SPOTIFY_CLIENT_ID,
            code_verifier: verifier
          });
          return fetch("https://accounts.spotify.com/api/token", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: body.toString()
          })
            .then(function (res) {
              if (!res.ok) throw new Error("Token exchange failed");
              return res.json();
            })
            .then(function (payload) {
              var token = storeSpotifyToken(payload);
              sessionStorage.removeItem(SPOTIFY_VERIFIER_KEY);
              sessionStorage.removeItem(SPOTIFY_STATE_KEY);
              sessionStorage.removeItem(SPOTIFY_AUTO_AUTH_KEY);
              var clean = window.location.origin + window.location.pathname;
              window.history.replaceState({}, document.title, clean);
              return token.access_token;
            });
        }

        function fetchSpotifyLibraryPlaylists(token) {
          var all = [];
          function loop(url) {
            return fetch(url, {
              headers: { Authorization: "Bearer " + token }
            })
              .then(function (res) {
                if (!res.ok) throw new Error("Spotify playlists request failed");
                return res.json();
              })
              .then(function (data) {
                var items = Array.isArray(data.items) ? data.items : [];
                for (var i = 0; i < items.length; i++) all.push(items[i]);
                if (data.next) return loop(data.next);
                return all;
              });
          }

          return loop("https://api.spotify.com/v1/me/playlists?limit=50")
            .then(function (items) {
              var filtered = [];
              for (var i = 0; i < items.length; i++) {
                var p = items[i] || {};
                var owner = p.owner || {};
                var ownerName = String(owner.display_name || owner.id || "").trim();
                if (ownerName.toLowerCase().indexOf("spotify") !== -1) continue;
                if (!p.name || !p.external_urls || !p.external_urls.spotify) continue;
                filtered.push({
                  name: p.name,
                  url: p.external_urls.spotify,
                  description: sanitizeSpotifyDescription(p.description || "")
                });
              }
              return filtered;
            });
        }

        function sanitizeSpotifyDescription(value) {
          var text = String(value || "").trim();
          if (!text) return "";
          var tmp = document.createElement("div");
          tmp.innerHTML = text;
          return (tmp.textContent || tmp.innerText || "").trim();
        }

        function jsonp(url) {
          return new Promise(function (resolve, reject) {
            var callbackName = "lastfmCb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
            var script = document.createElement("script");
            var timeout = window.setTimeout(function () {
              cleanup();
              reject(new Error("Last.fm request timed out"));
            }, 10000);

            window[callbackName] = function (data) {
              cleanup();
              resolve(data);
            };

            function cleanup() {
              window.clearTimeout(timeout);
              if (script.parentNode) script.parentNode.removeChild(script);
              try {
                delete window[callbackName];
              } catch (e) {
                window[callbackName] = undefined;
              }
            }

            script.src = url + "&callback=" + encodeURIComponent(callbackName);
            script.onerror = function () {
              cleanup();
              reject(new Error("Last.fm script load failed"));
            };
            document.body.appendChild(script);
          });
        }

        function getTrackImage(images) {
          if (!images || !images.length) return "";
          for (var i = images.length - 1; i >= 0; i--) {
            if (images[i] && images[i]["#text"]) return images[i]["#text"].replace(/"/g, "&quot;");
          }
          return "";
        }

        function safeUrl(url) {
          var s = String(url || "").trim();
          if (s.indexOf("http://") === 0 || s.indexOf("https://") === 0) return s.replace(/"/g, "&quot;");
          return "https://www.last.fm/user/" + encodeURIComponent(LASTFM_USER);
        }

        function escapeHtml(s) {
          var div = document.createElement("div");
          div.textContent = s;
          return div.innerHTML;
        }
      })();
    </script>
  </body>
</html>
