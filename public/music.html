<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Music — Tobias AEI" />
    <title>Tobias_AEI: Music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="headerPlaceholder"></div>
      <div class="music-layout">
        <main class="music-main">
          <header class="page-head">
            <h1>Music Landscapes</h1>
            <p>The sounds that keep me alive.</p>
          </header>

          <section class="music-hero" aria-label="Last played on Last.fm">
            <div class="music-hero-label">Now Playing</div>
            <div id="last-played-content">
              <p class="music-loading">Loading…</p>
            </div>
          </section>

          <section class="music-recs" aria-label="Top tracks">
            <h2 class="music-recs-title">Top Weekly Tracks</h2>
            <ul id="weekly-top-tracks" class="music-track-list music-track-grid">
              <li class="music-track-tile"><span class="music-track-name">Loading weekly tracks…</span><span class="music-track-artist">Last.fm</span></li>
            </ul>
          </section>

          <section class="music-curated" aria-label="Curated Playlists">
            <h2 class="music-recs-title">Curated Playlists</h2>
            <div id="curated-playlists">
              <article class="curated-item">
                <h3>Loading curated playlists…</h3>
                <p>Building picks from your listening profile.</p>
              </article>
            </div>
          </section>
        </main>
      </div>
      <div id="footerPlaceholder"></div>
    </div>
    <script src="main.js"></script>
    <script>
      (function () {
        var container = document.getElementById("last-played-content");
        var weeklyContainer = document.getElementById("weekly-top-tracks");
        var curatedContainer = document.getElementById("curated-playlists");
        if (!container) return;
        var LASTFM_API_KEY = "d74f9fdb9c79a50ffac2ca0700892ca1";
        var LASTFM_USER = "Tobias_AEI";
        var SPOTIFY_PLAYLIST_POOL = [
          {
            name: "lofi beats",
            url: "https://open.spotify.com/search/lofi%20beats%20playlist",
            note: "Low-tempo loops for deep focus sessions."
          },
          {
            name: "japanese city pop",
            url: "https://open.spotify.com/search/japanese%20city%20pop%20playlist",
            note: "Warm retro grooves and neon nostalgia."
          },
          {
            name: "ambient coding",
            url: "https://open.spotify.com/search/ambient%20coding%20playlist",
            note: "Soft textures for long coding nights."
          },
          {
            name: "late night jazzhop",
            url: "https://open.spotify.com/search/jazzhop%20playlist",
            note: "Jazz-infused beats for slow evenings."
          },
          {
            name: "dreamy indie",
            url: "https://open.spotify.com/search/dreamy%20indie%20playlist",
            note: "Floating guitars and hazy vocals."
          },
          {
            name: "melancholic alt",
            url: "https://open.spotify.com/search/melancholic%20alternative%20playlist",
            note: "A softer mood for reflective hours."
          },
          {
            name: "synthwave night drive",
            url: "https://open.spotify.com/search/synthwave%20night%20drive%20playlist",
            note: "Neon tempos and cinematic momentum."
          },
          {
            name: "post-rock focus",
            url: "https://open.spotify.com/search/post-rock%20playlist",
            note: "Instrumental crescendos and clarity."
          },
          {
            name: "chill electronic",
            url: "https://open.spotify.com/search/chill%20electronic%20playlist",
            note: "Digital calm for background listening."
          }
        ];

        fetchRecentTrack()
          .then(function (t) {
            if (!t || !t.name) {
              container.innerHTML = "<p class=\"music-loading\">No recent track.</p>";
              return;
            }
            var artist = t.artist && t.artist["#text"] ? t.artist["#text"] : "";
            var img = getTrackImage(t.image);
            var url = safeUrl(t.url);
            var isNowPlaying = !!(t["@attr"] && t["@attr"].nowplaying === "true");
            var status = isNowPlaying
              ? "Scrobbling now"
              : (t.date && t.date["#text"] ? t.date["#text"] : "Recently played");
            var html = "<div class=\"music-now-card\">";
            if (img) html += "<a href=\"" + url + "\" target=\"_blank\" rel=\"noopener\"><img src=\"" + img + "\" alt=\"\" width=\"120\" height=\"120\" class=\"music-now-art\"></a>";
            html += "<div class=\"music-now-info\"><a href=\"" + url + "\" target=\"_blank\" rel=\"noopener\" class=\"music-now-track\">" + escapeHtml(t.name) + "</a>";
            if (artist) html += "<span class=\"music-now-artist\">" + escapeHtml(artist) + "</span>";
            html += "<span class=\"music-now-status\">" + escapeHtml(status) + "</span>";
            html += "</div></div>";
            container.innerHTML = html;
          })
          .catch(function () {
            container.innerHTML = "<p class=\"music-loading\">Couldn’t load last played.</p>";
          });
        fetchWeeklyTopTracks()
          .then(renderWeeklyTracks)
          .catch(function () {
            if (!weeklyContainer) return;
            weeklyContainer.innerHTML = "<li class=\"music-track-tile\"><span class=\"music-track-name\">Couldn’t load weekly tracks.</span><span class=\"music-track-artist\">Try again later</span></li>";
          });
        renderCuratedPlaylists();

        function fetchRecentTrack() {
          var endpoint =
            "https://ws.audioscrobbler.com/2.0/?" +
            "method=user.getrecenttracks" +
            "&user=" +
            encodeURIComponent(LASTFM_USER) +
            "&api_key=" +
            encodeURIComponent(LASTFM_API_KEY) +
            "&limit=1&format=json";
          return jsonp(endpoint).then(function (data) {
            if (!data || !data.recenttracks || !data.recenttracks.track || !data.recenttracks.track[0]) {
              throw new Error("No recent tracks");
            }
            return data.recenttracks.track[0];
          });
        }

        function fetchWeeklyTopTracks() {
          var endpoint =
            "https://ws.audioscrobbler.com/2.0/?" +
            "method=user.gettoptracks" +
            "&user=" +
            encodeURIComponent(LASTFM_USER) +
            "&api_key=" +
            encodeURIComponent(LASTFM_API_KEY) +
            "&period=7day&limit=8&format=json";
          return jsonp(endpoint).then(function (data) {
            if (!data || !data.toptracks || !data.toptracks.track || !data.toptracks.track.length) {
              throw new Error("No weekly tracks");
            }
            return data.toptracks.track;
          });
        }

        function renderWeeklyTracks(tracks) {
          if (!weeklyContainer) return;
          var html = "";
          for (var i = 0; i < tracks.length; i++) {
            var track = tracks[i];
            if (!track || !track.name) continue;
            var artist = track.artist && track.artist.name ? track.artist.name : "Unknown artist";
            var plays = track.playcount ? " · " + track.playcount + " plays" : "";
            html += "<li class=\"music-track-tile\">";
            html += "<span class=\"music-track-name\">" + escapeHtml(track.name) + "</span>";
            html += "<span class=\"music-track-artist\">" + escapeHtml(artist + plays) + "</span>";
            html += "</li>";
          }
          weeklyContainer.innerHTML = html || "<li class=\"music-track-tile\"><span class=\"music-track-name\">No weekly tracks yet.</span><span class=\"music-track-artist\">Last.fm</span></li>";
        }

        function renderCuratedPlaylists() {
          if (!curatedContainer) return;
          var picks = getRotatingPlaylists();
          var html = "";
          for (var i = 0; i < picks.length; i++) {
            html += "<article class=\"curated-item\">";
            html += "<h3><a href=\"" + escapeHtml(picks[i].url) + "\" target=\"_blank\" rel=\"noopener\">" + escapeHtml(capitalizeWords(picks[i].name)) + "</a></h3>";
            html += "<p>" + escapeHtml(picks[i].note) + "</p>";
            html += "</article>";
          }
          curatedContainer.innerHTML = html;
        }

        function getRotatingPlaylists() {
          var cycle = Math.floor(Date.now() / (3 * 24 * 60 * 60 * 1000));
          var start = cycle % SPOTIFY_PLAYLIST_POOL.length;
          var picks = [];
          for (var i = 0; i < 3; i++) {
            picks.push(SPOTIFY_PLAYLIST_POOL[(start + i) % SPOTIFY_PLAYLIST_POOL.length]);
          }
          return picks;
        }

        function capitalizeWords(s) {
          return String(s || "").replace(/\b([a-z])/g, function (m) {
            return m.toUpperCase();
          });
        }

        function jsonp(url) {
          return new Promise(function (resolve, reject) {
            var callbackName = "lastfmCb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
            var script = document.createElement("script");
            var timeout = window.setTimeout(function () {
              cleanup();
              reject(new Error("Last.fm request timed out"));
            }, 10000);

            window[callbackName] = function (data) {
              cleanup();
              resolve(data);
            };

            function cleanup() {
              window.clearTimeout(timeout);
              if (script.parentNode) script.parentNode.removeChild(script);
              try {
                delete window[callbackName];
              } catch (e) {
                window[callbackName] = undefined;
              }
            }

            script.src = url + "&callback=" + encodeURIComponent(callbackName);
            script.onerror = function () {
              cleanup();
              reject(new Error("Last.fm script load failed"));
            };
            document.body.appendChild(script);
          });
        }

        function getTrackImage(images) {
          if (!images || !images.length) return "";
          for (var i = images.length - 1; i >= 0; i--) {
            if (images[i] && images[i]["#text"]) return images[i]["#text"].replace(/"/g, "&quot;");
          }
          return "";
        }

        function safeUrl(url) {
          var s = String(url || "").trim();
          if (s.indexOf("http://") === 0 || s.indexOf("https://") === 0) return s.replace(/"/g, "&quot;");
          return "https://www.last.fm/user/" + encodeURIComponent(LASTFM_USER);
        }

        function escapeHtml(s) {
          var div = document.createElement("div");
          div.textContent = s;
          return div.innerHTML;
        }
      })();
    </script>
  </body>
</html>
