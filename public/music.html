<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Music — Tobias AEI" />
    <title>Tobias_AEI: Music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="headerPlaceholder"></div>
      <div class="music-layout">
        <main>
          <section class="music-hero" aria-label="Last played on Last.fm">
            <div class="music-hero-label">Now playing</div>
            <div id="last-played-content">
              <p class="music-loading">Loading…</p>
            </div>
          </section>
          <section class="music-recs" aria-label="Recommendations">
            <h2 class="music-recs-title">Recommendations</h2>
            <ul class="music-track-list">
              <li class="music-track">
                <span class="music-track-name">—</span>
                <span class="music-track-artist">More soon</span>
              </li>
            </ul>
          </section>
        </main>
      </div>
      <div id="footerPlaceholder"></div>
    </div>
    <script src="main.js"></script>
    <script>
      (function () {
        var container = document.getElementById("last-played-content");
        if (!container) return;
        var apiUrl = "https://lastfm-last-played.biancarosa.com.br/Tobias_AEI/latest-song";
        fetch(apiUrl)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var t = data.track;
            if (!t || !t.name) {
              container.innerHTML = "<p class=\"music-loading\">No recent track.</p>";
              return;
            }
            var artist = t.artist && t.artist["#text"] ? t.artist["#text"] : "";
            var img = (t.image && t.image[2] && t.image[2]["#text"]) ? t.image[2]["#text"] : "";
            var url = t.url || "#";
            var html = "<div class=\"music-now-card\">";
            if (img) html += "<a href=\"" + url.replace(/"/g, "&quot;") + "\" target=\"_blank\" rel=\"noopener\"><img src=\"" + img.replace(/"/g, "&quot;") + "\" alt=\"\" width=\"120\" height=\"120\" class=\"music-now-art\"></a>";
            html += "<div class=\"music-now-info\"><a href=\"" + url.replace(/"/g, "&quot;") + "\" target=\"_blank\" rel=\"noopener\" class=\"music-now-track\">" + escapeHtml(t.name) + "</a>";
            if (artist) html += " <span class=\"music-now-artist\">" + escapeHtml(artist) + "</span>";
            html += "</div></div>";
            container.innerHTML = html;
          })
          .catch(function () {
            container.innerHTML = "<p class=\"music-loading\">Couldn’t load last played. <a href=\"https://www.last.fm/user/Tobias_AEI\" target=\"_blank\" rel=\"noopener\">View on Last.fm</a>.</p>";
          });
        function escapeHtml(s) {
          var div = document.createElement("div");
          div.textContent = s;
          return div.innerHTML;
        }
      })();
    </script>
  </body>
</html>
