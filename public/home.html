<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Tobias AEI — digital lab, notes, projects, and sound." />
    <title>Tobias_AEI: Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="headerPlaceholder"></div>
      <main class="home-main">
        <section class="home-hero reveal">
          <p class="home-kicker">Personal website</p>
          <h1>Home of a failing bard.</h1>
        </section>
      </main>
      <div id="footerPlaceholder"></div>
    </div>
    <div class="lofi-player" data-lofi-player>
      <button type="button" class="lofi-toggle" data-lofi-toggle aria-pressed="false">
        Play lofi
      </button>
      <label class="lofi-volume-wrap">
        <span class="sr-only">Lofi volume</span>
        <input
          type="range"
          class="lofi-volume"
          data-lofi-volume
          min="0"
          max="1"
          step="0.05"
          value="0.45"
          aria-label="Lofi volume"
        />
      </label>
      <audio data-lofi-audio preload="none">
        <source src="https://ice1.somafm.com/groovesalad-128-mp3" type="audio/mpeg" />
        <source src="https://ice2.somafm.com/groovesalad-128-mp3" type="audio/mpeg" />
      </audio>
    </div>
    <script src="main.js"></script>
  </body>
</html>
