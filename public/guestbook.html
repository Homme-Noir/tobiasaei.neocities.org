<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Guestbook — Tobias AEI" />
    <title>Tobias_AEI | Guestbook</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="headerPlaceholder"></div>
      <div class="guestbook-layout">
        <main>
          <section class="guestbook-hero">
            <h1>Visitor Logs</h1>
            <p>Leave a trace before you close the tab.</p>
          </section>

          <section class="guestbook-form-wrap" aria-label="Guestbook form">
            <form class="guestbook-form" data-guestbook-form>
              <label>
                Identifier (Optional)
                <input
                  type="text"
                  name="name"
                  maxlength="40"
                  placeholder="Anonymous"
                />
              </label>
              <label>
                Message *
                <textarea
                  name="message"
                  maxlength="400"
                  required
                  placeholder="What is on your mind?"
                ></textarea>
              </label>
              <button type="submit">Sign log</button>
            </form>
          </section>

          <section class="guestbook-list" aria-label="Guestbook entries">
            <h2>Recent entries</h2>
            <p class="guestbook-empty" data-guestbook-empty>No messages yet.</p>
            <ul class="guestbook-entries" data-guestbook-entries></ul>
          </section>
        </main>
      </div>
      <div id="footerPlaceholder"></div>
    </div>

    <script src="main.js"></script>
    <script>
      (function () {
        var key = "tae_guestbook_entries_v1";
        var form = document.querySelector("[data-guestbook-form]");
        var list = document.querySelector("[data-guestbook-entries]");
        var empty = document.querySelector("[data-guestbook-empty]");
        if (!form || !list || !empty) return;

        function getEntries() {
          try {
            var raw = localStorage.getItem(key);
            if (!raw) return [];
            var parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) return [];
            for (var i = 0; i < parsed.length; i++) {
              if (!parsed[i].id) parsed[i].id = "e_" + Date.now() + "_" + i;
              if (!parsed[i].name) parsed[i].name = "Anonymous";
              if (!Array.isArray(parsed[i].replies)) parsed[i].replies = [];
            }
            return parsed;
          } catch (e) {
            return [];
          }
        }

        function saveEntries(entries) {
          localStorage.setItem(key, JSON.stringify(entries.slice(0, 50)));
        }

        function render(entries) {
          list.innerHTML = "";
          empty.style.display = entries.length ? "none" : "";
          for (var i = 0; i < entries.length; i++) {
            var item = entries[i];
            var li = document.createElement("li");
            li.className = "guestbook-entry";

            var meta = document.createElement("p");
            meta.className = "guestbook-entry-meta";
            meta.textContent = item.name + " — " + item.date;

            var msg = document.createElement("p");
            msg.className = "guestbook-entry-message";
            msg.textContent = item.message;

            var replies = document.createElement("ul");
            replies.className = "guestbook-replies";
            var replyItems = Array.isArray(item.replies) ? item.replies : [];
            for (var r = 0; r < replyItems.length; r++) {
              var rep = replyItems[r];
              var rLi = document.createElement("li");
              rLi.className = "guestbook-reply";

              var rMeta = document.createElement("p");
              rMeta.className = "guestbook-entry-meta";
              rMeta.textContent = rep.name + " — " + rep.date;

              var rMsg = document.createElement("p");
              rMsg.className = "guestbook-entry-message";
              rMsg.textContent = rep.message;

              rLi.appendChild(rMeta);
              rLi.appendChild(rMsg);
              replies.appendChild(rLi);
            }

            var replyForm = document.createElement("form");
            replyForm.className = "guestbook-reply-form";
            replyForm.innerHTML =
              '<label>Reply as (Optional)<input type="text" name="name" maxlength="40" placeholder="Anonymous" /></label>' +
              '<label>Reply *<textarea name="message" maxlength="400" required placeholder="Write a reply..."></textarea></label>' +
              '<button type="submit">Reply</button>';
            replyForm.addEventListener("submit", function (entryId) {
              return function (ev) {
                ev.preventDefault();
                var fd = new FormData(ev.currentTarget);
                var name = String(fd.get("name") || "").trim();
                var message = String(fd.get("message") || "").trim();
                if (!message) return;
                var updated = getEntries();
                for (var k = 0; k < updated.length; k++) {
                  if (updated[k].id === entryId) {
                    if (!Array.isArray(updated[k].replies)) updated[k].replies = [];
                    updated[k].replies.push({
                      id: "r_" + Date.now() + "_" + Math.floor(Math.random() * 10000),
                      name: (name || "Anonymous").slice(0, 40),
                      message: message.slice(0, 400),
                      date: new Date().toLocaleString()
                    });
                    break;
                  }
                }
                saveEntries(updated);
                render(updated);
              };
            }(item.id));

            li.appendChild(meta);
            li.appendChild(msg);
            li.appendChild(replies);
            li.appendChild(replyForm);
            list.appendChild(li);
          }
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var fd = new FormData(form);
          var name = String(fd.get("name") || "").trim();
          var message = String(fd.get("message") || "").trim();
          if (!message) return;
          var entries = getEntries();
          entries.unshift({
            id: "e_" + Date.now() + "_" + Math.floor(Math.random() * 10000),
            name: (name || "Anonymous").slice(0, 40),
            message: message.slice(0, 400),
            date: new Date().toLocaleString(),
            replies: []
          });
          saveEntries(entries);
          render(entries);
          form.reset();
        });

        render(getEntries());
      })();
    </script>
  </body>
</html>
