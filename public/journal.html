<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Journal — Tobias AEI" />
    <title>Tobias_AEI: Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,600&family=Red+Hat+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="headerPlaceholder"></div>
      <div class="journal-layout">
        <main class="journal-stream">
          <header class="page-head page-head--center journal-head">
            <h1>Inner Monologue</h1>
            <p>Timestamped fragments of thoughts.</p>
          </header>
          <div id="journal-entries"></div>
        </main>
      </div>
      <div id="footerPlaceholder"></div>
    </div>
    <script>
      (function () {
        var root = document.getElementById("journal-entries");
        if (!root) return;

        var entries = [
          {
            fileName: "Conversations with myself",
            datetime: "Forgotten",
            body: "I started writing down the late-night conversations I have with myself. Somewhere between doubt and stubborn hope, I keep finding reasons to continue."
          },
          {
            fileName: "life",
            datetime: "Forgotten",
            body: "If I do not define a goal, I drift. Discipline, perseverance, and deliberate practice remain the strongest framework I trust."
          },
          {
            fileName: "myself",
            datetime: "Forgotten",
            body: "I felt incomplete and I was floating. I do not want to stay static, and I keep trying to replace apathy with deliberate action."
          },
          {
            fileName: "beauty",
            datetime: "Forgotten",
            body: "Beauty is in the eye of the beholder, but I still question what beauty means and why we surrender to it."
          },
          {
            fileName: "love",
            datetime: "Forgotten",
            body: "Relationships should not be built on assumptions. If people care, they should talk honestly and solve things without noise."
          },
          {
            fileName: "money",
            datetime: "Forgotten",
            body: "I want wealth, not fleeting riches. Sustainable cashflow and long-term stability matter more than showy success."
          },
          {
            fileName: "random stuff",
            datetime: "Forgotten",
            body: "A fragmented notebook of thoughts, ideas, anxieties, and reminders that still map who I am becoming."
          },
          {
            fileName: "Vanessa's gift",
            datetime: "Forgotten",
            body: "A stitched index of linked personal notes: beauty, life, myself, love, money, and scattered thoughts."
          }
        ];

        function esc(s) {
          var el = document.createElement("div");
          el.textContent = String(s || "");
          return el.innerHTML;
        }

        var html = "";
        for (var i = 0; i < entries.length; i++) {
          html += "<article class=\"journal-item\">";
          html += "<time class=\"journal-date\" datetime=\"\">" + esc(entries[i].datetime || "Forgotten") + "</time>";
          html += "<div class=\"journal-body\">";
          html += "<h2 class=\"journal-item-title\">" + esc(entries[i].fileName) + "</h2>";
          html += "<p>" + esc(entries[i].body) + "</p>";
          html += "</div></article>";
        }
        root.innerHTML = html;
      })();
    </script>
    <script src="main.js"></script>
  </body>
</html>
