<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Journal — Tobias AEI" />
    <title>Tobias_AEI | Journal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="headerPlaceholder"></div>
      <div class="journal-layout">
        <main class="journal-stream">
          <header class="page-head page-head--center journal-head">
            <h1>Inner Monologue</h1>
            <p>Timestamped fragments of thoughts.</p>
          </header>
          <div class="writings-filter journal-filter" role="tablist" aria-label="Journal filters">
            <button type="button" role="tab" aria-selected="true" aria-controls="journal-entries" class="journal-filter-btn active" data-journal-filter="journal">[Journal]</button>
            <button type="button" role="tab" aria-selected="false" aria-controls="journal-entries" class="journal-filter-btn" data-journal-filter="indexes">[Indexes]</button>
            <button type="button" role="tab" aria-selected="false" aria-controls="journal-entries" class="journal-filter-btn" data-journal-filter="all">[All]</button>
          </div>
          <div id="journal-entries" role="tabpanel"></div>
        </main>
      </div>
      <div id="footerPlaceholder"></div>
    </div>
    <script src="page-utils.js"></script>
    <script>
      (function () {
        var root = document.getElementById("journal-entries");
        if (!root) return;
        var utils = window.TAEUtils || {};
        var escapeHtml = typeof utils.escapeHtml === "function"
          ? utils.escapeHtml
          : function (s) {
              var el = document.createElement("div");
              el.textContent = String(s || "");
              return el.innerHTML;
            };
        var filterButtons = document.querySelectorAll(".journal-filter-btn");
        var entries = [];
        var activeFilter = "journal";

        function visibleEntries() {
          if (activeFilter === "all") return entries.slice();
          if (activeFilter === "indexes") {
            return entries.filter(function (e) {
              return !!e.isIndex;
            });
          }
          return entries.filter(function (e) {
            return !e.isIndex;
          });
        }

        function render() {
          var current = visibleEntries();
          if (!current.length) {
            root.innerHTML =
              "<article class=\"journal-item\"><time class=\"journal-date\" datetime=\"\">Forgotten</time><div class=\"journal-body\"><h2 class=\"journal-item-title\">No entries</h2><p>No notes match this filter.</p></div></article>";
            return;
          }
          var html = "";
          for (var i = 0; i < current.length; i++) {
            var entry = current[i] || {};
            var datetime = entry.datetime || "Forgotten";
            var title = entry.title || "Untitled";
            var body = String(entry.content || "");
            var machineDatetime = typeof utils.parseISODate === "function" ? utils.parseISODate(datetime) : "";
            html += "<article class=\"journal-item\">";
            if (machineDatetime) {
              html += "<time class=\"journal-date\" datetime=\"" + machineDatetime + "\">" + escapeHtml(datetime) + "</time>";
            } else {
              html += "<span class=\"journal-date\">" + escapeHtml(datetime) + "</span>";
            }
            html += "<div class=\"journal-body\">";
            html += "<h2 class=\"journal-item-title\">" + escapeHtml(title) + "</h2>";
            html += "<div class=\"vault-text\">" + escapeHtml(body) + "</div>";
            html += "</div></article>";
          }
          root.innerHTML = html;
          if (typeof utils.refreshStagger === "function") utils.refreshStagger();
        }

        for (var i = 0; i < filterButtons.length; i++) {
          filterButtons[i].addEventListener("click", function () {
            var next = this.getAttribute("data-journal-filter") || "journal";
            activeFilter = next;
            for (var j = 0; j < filterButtons.length; j++) {
              var isActive = filterButtons[j] === this;
              filterButtons[j].classList.toggle("active", isActive);
              filterButtons[j].setAttribute("aria-selected", isActive ? "true" : "false");
            }
            render();
          });
        }

        fetch("data/vault-journal.json", { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("Journal unavailable");
            return res.json();
          })
          .then(function (data) {
            if (!Array.isArray(data)) data = [];
            entries = data;
            render();
          })
          .catch(function () {
            root.innerHTML =
              "<article class=\"journal-item\"><time class=\"journal-date\" datetime=\"\">Forgotten</time><div class=\"journal-body\"><h2 class=\"journal-item-title\">Journal unavailable</h2><p>Vault export could not be loaded.</p></div></article>";
            if (typeof utils.refreshStagger === "function") utils.refreshStagger();
          });
      })();
    </script>
    <script src="main.js"></script>
  </body>
</html>
