<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Writings — Tobias AEI" />
    <title>Tobias_AEI: Writings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="headerPlaceholder"></div>
      <div class="writings-layout">
        <main class="writings-content">
          <header class="page-head">
            <h1>Scattered Writings</h1>
            <p>Poems from my obsidian vault.</p>
          </header>
          <div class="writings-filter">
            <span>[All]</span><span>[Poetry]</span>
          </div>

          <ul class="writings-entries" id="writings-list"></ul>
        </main>
      </div>
      <div id="footerPlaceholder"></div>
    </div>
    <script>
      (function () {
        var container = document.getElementById("writings-list");
        if (!container) return;

        function escapeHtml(s) {
          var div = document.createElement("div");
          div.textContent = String(s || "");
          return div.innerHTML;
        }

        fetch("data/vault-poems.json", { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("Poems unavailable");
            return res.json();
          })
          .then(function (poems) {
            if (!Array.isArray(poems) || !poems.length) {
              container.innerHTML = "<li><details class=\"writings-entry\" open><summary><span class=\"entry-type\">Poetry</span><time datetime=\"\">Forgotten</time><h2>No poems found</h2></summary><p class=\"writings-excerpt\">Could not load poems from vault export.</p></details></li>";
              return;
            }
            var html = "";
            for (var i = 0; i < poems.length; i++) {
              var poem = poems[i] || {};
              var title = poem.title || "Untitled";
              var content = String(poem.content || "");
              var isOpen = i < 2 ? " open" : "";
              html += "<li>";
              html += "<details class=\"writings-entry\"" + isOpen + ">";
              html += "<summary>";
              html += "<span class=\"entry-type\">Poetry</span>";
              html += "<h2>" + escapeHtml(title) + "</h2>";
              html += "</summary>";
              html += "<div class=\"writings-full vault-text\">" + escapeHtml(content) + "</div>";
              html += "</details>";
              html += "</li>";
            }
            container.innerHTML = html;
          })
          .catch(function () {
            container.innerHTML = "<li><details class=\"writings-entry\" open><summary><span class=\"entry-type\">Poetry</span><time datetime=\"\">Forgotten</time><h2>Poems unavailable</h2></summary><p class=\"writings-excerpt\">Vault export could not be loaded.</p></details></li>";
          });
      })();
    </script>
    <script src="main.js"></script>
  </body>
</html>
