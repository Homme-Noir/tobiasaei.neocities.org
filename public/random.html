<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Random — Tobias AEI" />
    <title>Tobias_AEI: Random</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="headerPlaceholder"></div>
      <div class="random-layout">
        <main class="random-bento">
          <section class="random-tile random-tile--wide" aria-label="Thing of the day">
            <h2 class="random-tile-title">Thing of the day</h2>
            <p>—</p>
          </section>
          <section class="random-tile" aria-label="Links">
            <h2 class="random-tile-title">Links</h2>
            <ul class="random-links">
              <li><a href="#">—</a></li>
            </ul>
          </section>
          <section class="random-tile random-tile--tall" aria-label="Quote">
            <h2 class="random-tile-title">Quote</h2>
            <blockquote>—</blockquote>
          </section>
        </main>
      </div>
      <div id="footerPlaceholder"></div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
